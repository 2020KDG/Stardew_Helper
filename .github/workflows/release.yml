name: Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Determine Release Tag
        id: tag
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
            echo "IS_PRE_RELEASE=false" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "Test_version"
            echo "IS_PRE_RELEASE=true" >> $env:GITHUB_OUTPUT
          }
          echo "TAG_NAME=$tag" >> $env:GITHUB_OUTPUT

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ steps.tag.outputs.TAG_NAME }}
          releaseName: 'Stardew Helper ${{ steps.tag.outputs.TAG_NAME }}'
          releaseBody: '자동으로 빌드된 릴리즈 설치 파일입니다.'
          releaseDraft: false
          prerelease: ${{ steps.tag.outputs.IS_PRE_RELEASE == 'true' }}

      - name: Generate and Upload updater.json
        if: steps.tag.outputs.IS_PRE_RELEASE == 'false'
        run: |
          $version = "${{ steps.tag.outputs.TAG_NAME }}".TrimStart('v')
          $sigPath = "src-tauri/target/release/bundle/nsis/Stardew Helper_${version}_x64-setup.nsis.zip.sig"
          if (Test-Path $sigPath) {
            $signature = Get-Content $sigPath -Raw
            $json = @{
              version = $version
              notes = "✨ 새로운 버전 업데이트가 가능합니다."
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                "windows-x86_64" = @{
                  signature = $signature.Trim()
                  url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.TAG_NAME }}/Stardew%20Helper_${version}_x64-setup.nsis.zip"
                }
              }
            }
            $json | ConvertTo-Json -Depth 5 | Set-Content updater.json
            gh release upload ${{ steps.tag.outputs.TAG_NAME }} updater.json --clobber
          } else {
            Write-Host "Signature file not found: $sigPath"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Portable Executable and Mod
        run: |
          if (Test-Path "src-tauri/target/release/tauri-app.exe") {
            Copy-Item -Force "src-tauri/target/release/tauri-app.exe" "StardewHelper_Portable.exe"
            gh release upload ${{ steps.tag.outputs.TAG_NAME }} StardewHelper_Portable.exe --clobber
          }
          
          # Test_version에서 기존 모드 파일을 받아서 새 릴리즈에도 복사 업로드
          if ("${{ steps.tag.outputs.TAG_NAME }}" -ne "Test_version") {
            try {
              gh release download Test_version -p "StardewHelperMod.zip"
              if (Test-Path "StardewHelperMod.zip") {
                gh release upload ${{ steps.tag.outputs.TAG_NAME }} StardewHelperMod.zip --clobber
              }
            } catch {
              Write-Host "No StardewHelperMod.zip found in Test_version."
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README.md
        if: steps.tag.outputs.IS_PRE_RELEASE == 'false'
        run: |
          $version = "${{ steps.tag.outputs.TAG_NAME }}".TrimStart('v')
          $readmePath = "README.md"
          $content = Get-Content $readmePath -Raw
          
          # 버전 번호와 다운로드 태그 링크 교체
          $content = $content -replace "Stardew\.Helper_[0-9\.]+_x64-setup\.exe", "Stardew.Helper_${version}_x64-setup.exe"
          $content = $content -replace "Stardew Helper_[0-9\.]+_x64-setup\.exe", "Stardew Helper_${version}_x64-setup.exe"
          $content = $content -replace "download/[^/]+/", "download/${{ steps.tag.outputs.TAG_NAME }}/"
          
          $content | Set-Content $readmePath
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $readmePath
          
          # 변경사항이 있을 때만 커밋 및 푸시
          if (git diff --cached --quiet) {
            Write-Host "No changes to README.md"
          } else {
            git commit -m "docs: update download links to ${{ steps.tag.outputs.TAG_NAME }} [skip ci]"
            git fetch origin main
            git push origin HEAD:main
          }
